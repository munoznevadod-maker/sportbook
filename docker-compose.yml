services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jakartaee_app
    ports:
      - "8085:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-bd1}
      DB_USER: ${DB_USER:-sportbook}
      DB_PASSWORD: ${DB_PASSWORD:-sportbook_dev}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@sportbook.local}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
    networks:
      - red_app

  mysql:
    image: mysql:8.0
    container_name: mysql_bd1
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_dev}
      MYSQL_DATABASE: ${DB_NAME:-bd1}
      MYSQL_USER: ${DB_USER:-sportbook}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sportbook_dev}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - red_app

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_bd1
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-sportbook}
      PMA_PASSWORD: ${DB_PASSWORD:-sportbook_dev}
    depends_on:
      - mysql
    networks:
      - red_app

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit_sportbook
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - red_app

volumes:
  mysql_data:

networks:
  red_app:
    driver: bridge
