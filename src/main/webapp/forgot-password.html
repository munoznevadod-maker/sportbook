<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar cuenta | SportBook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/css/login.css?v=7">
    <link rel="stylesheet" href="Assets/css/forgot-password.css?v=7">
    <link rel="icon" type="image/x-icon" href="Assets/img/icon.png">
</head>
<body>

<div class="login-container recover-container">
    <div class="login-box recover-box">
        <div class="auth-brand" aria-hidden="true">
            <span>SB</span>
            <strong>SportBook</strong>
        </div>

        <h1>Recupera tu cuenta</h1>

        <p id="recoverIntro">
            Introduce tu correo y te enviaremos un código para crear una contraseña nueva.
        </p>

        <form id="checkAccountForm" method="POST">
            <div class="input-group">
                <label for="recoverEmail">Correo electrónico</label>
                <input type="email" id="recoverEmail" placeholder="tu@correo.com" required>
            </div>

            <button type="submit" class="btn-login">
                Buscar cuenta
            </button>
        </form>

        <form id="verifyCodeForm" class="hidden" method="POST">
            <div class="account-found" id="accountFound"></div>

            <div class="input-group">
                <label for="verificationCode">Código de verificación</label>
                <input
                    type="text"
                    id="verificationCode"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    placeholder="123456"
                    required
                >
            </div>

            <button type="submit" class="btn-login">
                Verificar código
            </button>
        </form>

        <form id="resetPasswordForm" class="hidden" method="POST">
            <div class="input-group">
                <label for="newPassword">Nueva contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="********" minlength="6" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="********" minlength="6" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Cambiar contraseña
            </button>
        </form>

        <p id="recoverMessage" class="recover-message" aria-live="polite"></p>

        <div class="extra-links recover-links">
            <a id="backToLoginLink" href="login.html">
                Volver al inicio de sesión
            </a>

            <a href="register.html">
                Crear cuenta
            </a>
        </div>
    </div>
</div>



<script src="Assets/js/forgot-password.js?v=7"></script>

</body>
</html>
